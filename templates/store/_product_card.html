
<article class="product-card">

    <a class="product-image" href="{{ product.get_absolute_url }}">

        {% if product.image_url %}
            <img
                src="{{ product.image_url }}"
                alt="{{ product.name }}"
                loading="lazy">
        {% else %}
            <span>🌿</span>
        {% endif %}

        {% if product.is_new %}
            <b>Nuevo</b>
        {% endif %}

    </a>

    {% if product.category %}
        <p class="product-category">
            {{ product.category.name }}
        </p>
    {% endif %}

    <h3>
        <a href="{{ product.get_absolute_url }}">
            {{ product.name }}
        </a>
    </h3>

    <div class="product-bottom">

        <div class="product-price">
            <strong>{{ product.display_price }} €</strong>
            <small>IVA incluido</small>
        </div>

        <form
            method="post"
            action="{% url 'store:add_to_cart' product.id %}">

            {% csrf_token %}

            <input
                type="hidden"
                name="next"
                value="{{ request.path }}">

            <button
                type="submit"
                aria-label="Añadir {{ product.name }}">
                🛒
            </button>

        </form>

    </div>

</article>
